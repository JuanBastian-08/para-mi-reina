<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti 🌻</title>

  <!--
    FUENTES: Playfair Display para los títulos (elegante, de revista),
    Lora para el mensaje (cálido, legible, parecido a carta escrita).
    Se cargan gratis desde Google Fonts.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;1,400;1,500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ============================================================
       VARIABLES GLOBALES DE COLOR Y FUENTE
       Cambiar aquí afecta toda la página de una sola vez.
    ============================================================ */
    :root {
      --crema:        #FDF8F0;  /* Fondo principal, color papel carta */
      --crema-oscuro: #F5EDD8;  /* Fondo de la tarjeta                */
      --dorado:       #E8A020;  /* Amarillo girasol intenso (botón)   */
      --dorado-hover: #C8880F;  /* Dorado más oscuro al pasar el mouse*/
      --rojo-tulipan: #C0392B;  /* Rojo suave tulipán                 */
      --cafe:         #6B4226;  /* Café cálido para texto principal   */
      --cafe-claro:   #9E7B5A;  /* Café más claro para textos sutiles */
      --verde-hoja:   #5A7A3A;  /* Verde tallo, para acentos          */
    }

    /* ============================================================
       RESET BÁSICO Y CONFIGURACIÓN DEL BODY
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: var(--crema);

      /*
        Patrón sutil de fondo: pequeños puntos decorativos.
        radial-gradient crea un punto circular; background-size lo repite.
        Esto le da textura de papel sin ser agresivo.
      */
      background-image: radial-gradient(
        circle,
        rgba(232, 160, 32, 0.12) 1px,
        transparent 1px
      );
      background-size: 28px 28px;

      font-family: 'Lora', serif;
      color: var(--cafe);

      /* Centra todo el contenido vertical y horizontalmente */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ============================================================
       DECORACIÓN DE FLORES EN LAS ESQUINAS
       Usamos ::before y ::after del body para poner flores fijas
       en las esquinas sin afectar el flujo del contenido.
    ============================================================ */
    body::before {
      content: "🌻🌷";
      position: fixed;
      top: 1rem;
      left: 1.2rem;
      font-size: 2rem;
      opacity: 0.5;           /* Transparencia para que sea sutil    */
      letter-spacing: -4px;
      pointer-events: none;   /* No interfiere con clics del usuario */
    }

    body::after {
      content: "🌷🌻";
      position: fixed;
      bottom: 1rem;
      right: 1.2rem;
      font-size: 2rem;
      opacity: 0.5;
      letter-spacing: -4px;
      pointer-events: none;
    }

    /* ============================================================
       TARJETA PRINCIPAL — El "sobre" o carta
    ============================================================ */
    .tarjeta {
      background-color: var(--crema-oscuro);
      width: 100%;
      max-width: 520px;
      padding: 2.8rem 2.5rem;

      /*
        border-radius redondea las esquinas.
        Los valores distintos (16px arriba, 24px abajo) le dan
        una forma ligeramente asimétrica, más orgánica y cálida.
      */
      border-radius: 16px 16px 24px 24px;

      border: 1.5px solid rgba(232, 160, 32, 0.3);

      /*
        box-shadow crea sombras. Aquí usamos tres capas:
        1. Sombra principal difusa (sensación de elevación)
        2. Sombra pequeña y nítida (borde sutil debajo)
        3. Brillo interior en la parte superior (efecto pergamino)
      */
      box-shadow:
        0 12px 40px rgba(107, 66, 38, 0.12),
        0 4px 12px  rgba(107, 66, 38, 0.08),
        inset 0 1px 0  rgba(255, 255, 255, 0.6);

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;

      /*
        La tarjeta completa tiene una animación de entrada.
        "fadeSlideUp" está definida más abajo en @keyframes.
        0.5s = duración, ease = aceleración suave, both = aplica
        el estado inicial antes de que empiece la animación.
      */
      animation: fadeSlideUp 0.7s ease both;
    }

    /* ============================================================
       ENCABEZADO: GIRASOL DECORATIVO
       Un girasol grande como ícono central de la tarjeta.
    ============================================================ */
    .icono-flor {
      font-size: 2.8rem;
      line-height: 1;
      /*
        filter: drop-shadow() agrega sombra a un emoji/imagen.
        Es diferente a box-shadow que solo aplica al rectángulo del elemento.
      */
      filter: drop-shadow(0 2px 4px rgba(232, 160, 32, 0.35));
    }

    /* ============================================================
       FECHA DEL DÍA
       Texto pequeño, café claro, espaciado generoso entre letras.
    ============================================================ */
    .fecha {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--cafe-claro);
      letter-spacing: 0.06em;
      text-align: center;
    }

    /* ============================================================
       SEPARADOR FLORAL
       Una línea decorativa hecha solo con CSS y un emoji central.
    ============================================================ */
    .separador {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: rgba(232, 160, 32, 0.5);
      font-size: 0.8rem;
    }

    /* Las líneas horizontales a cada lado del emoji */
    .separador::before,
    .separador::after {
      content: "";
      flex: 1;                              /* Se expanden para llenar el espacio */
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(232, 160, 32, 0.4),
        transparent
      );
    }

    /* ============================================================
       BOTÓN "ABRIR MENSAJE"
       Es lo primero que ve al entrar. Al hacer clic, se oculta
       y aparece el mensaje con animación.
    ============================================================ */
    #btn-abrir {
      /* Reseteamos estilos por defecto del navegador */
      border: none;
      cursor: pointer;

      background-color: var(--dorado);
      color: #fff;
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 0.03em;

      padding: 0.75rem 2rem;
      border-radius: 50px;      /* Completamente redondeado (pastilla) */

      box-shadow:
        0 4px 14px rgba(232, 160, 32, 0.35),
        0 1px 3px  rgba(232, 160, 32, 0.2);

      /*
        transition define QUÉ cambia y EN CUÁNTO TIEMPO cuando
        hay un cambio de estado (como :hover).
        "all 0.25s ease" = todos los cambios en 0.25 segundos.
      */
      transition: all 0.25s ease;

      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Estado hover: se oscurece y sube ligeramente */
    #btn-abrir:hover {
      background-color: var(--dorado-hover);
      transform: translateY(-2px);       /* Sube 2px, efecto "flotante" */
      box-shadow:
        0 6px 20px rgba(232, 160, 32, 0.45),
        0 2px 6px  rgba(232, 160, 32, 0.3);
    }

    /* Estado active (mientras se mantiene presionado) */
    #btn-abrir:active {
      transform: translateY(0);          /* Vuelve a su lugar al presionar */
    }

    /* ============================================================
       CONTENEDOR DEL MENSAJE — oculto al inicio
       JavaScript lo hace visible cuando se presiona el botón.
    ============================================================ */
    #contenedor-mensaje {
      width: 100%;
      text-align: center;

      /*
        CLAVE: Este elemento comienza oculto.
        Usamos opacity (0 = invisible) + max-height (0 = sin espacio)
        en lugar de display:none, porque display:none no se puede
        animar con CSS, pero opacity y max-height sí.
      */
      opacity: 0;
      max-height: 0;
      overflow: hidden;

      /* transition: define la animación cuando cambian estos valores */
      transition:
        opacity  0.6s ease 0.1s,     /* opacity tarda 0.6s, empieza 0.1s después */
        max-height 0.8s ease;         /* max-height tarda 0.8s                    */
    }

    /*
      Clase .visible que JS agrega al presionar el botón.
      Cuando el elemento tiene esta clase, opacity pasa a 1
      y max-height a 500px — CSS hace la animación sola.
    */
    #contenedor-mensaje.visible {
      opacity: 1;
      max-height: 500px;
    }

    /* ============================================================
       EL MENSAJE DE TEXTO
    ============================================================ */
    .mensaje-texto {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 3.5vw, 1.25rem); /* Tamaño fluido: se adapta a la pantalla */
      font-weight: 500;
      line-height: 1.85;
      color: var(--cafe);

      /*
        white-space: pre-wrap respeta los saltos de línea \n
        que pongas en el JavaScript (más abajo).
      */
      white-space: pre-wrap;

      padding: 0.5rem 0.2rem;
    }

    /* ============================================================
       FIRMA AL PIE DEL MENSAJE
    ============================================================ */
    .firma {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      color: var(--cafe-claro);
      margin-top: 0.8rem;
    }

    /* ============================================================
       TULIPANES INFERIORES — decoración al pie de la tarjeta
    ============================================================ */
    .flores-pie {
      font-size: 1.4rem;
      letter-spacing: 2px;
      opacity: 0.65;
      margin-top: 0.4rem;
    }

    /* ============================================================
       ANIMACIONES — definidas con @keyframes
    ============================================================ */

    /*
      fadeSlideUp: la tarjeta sube desde abajo y aparece.
      from = estado inicial | to = estado final
    */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(24px);  /* Empieza 24px más abajo */
      }
      to {
        opacity: 1;
        transform: translateY(0);     /* Llega a su posición normal */
      }
    }

    /* ============================================================
       RESPONSIVE — ajustes para pantallas pequeñas
    ============================================================ */
    @media (max-width: 420px) {
      .tarjeta {
        padding: 2rem 1.5rem;
      }
      body::before,
      body::after {
        font-size: 1.5rem;
      }
    }

    /* Respeta la preferencia del usuario de reducir animaciones */
    @media (prefers-reduced-motion: reduce) {
      .tarjeta             { animation: none; }
      #contenedor-mensaje  { transition: none; }
      #btn-abrir           { transition: none; }
    }
  </style>
</head>

<body>

  <main class="tarjeta" role="main" aria-label="Carta del día">

    <!-- Ícono principal -->
    <div class="icono-flor" aria-hidden="true">🌻</div>

    <!--
      FECHA AUTOMÁTICA
      El id="fecha" le dice a JavaScript dónde escribir la fecha.
      Inicia vacío; JS lo llena al cargar la página.
    -->
    <p class="fecha" id="fecha" aria-live="polite"></p>

    <!-- Separador decorativo con tulipán -->
    <div class="separador" aria-hidden="true">🌷</div>

    <!--
      BOTÓN PARA ABRIR EL MENSAJE
      id="btn-abrir" permite que JS lo encuentre y le agregue el evento.
      aria-expanded="false" informa a lectores de pantalla el estado.
    -->
    <button
      id="btn-abrir"
      aria-expanded="false"
      aria-controls="contenedor-mensaje"
    >
      <span aria-hidden="true">✉️</span>
      Abrir mensaje de hoy
    </button>

    <!--
      CONTENEDOR DEL MENSAJE (oculto al inicio)
      id="contenedor-mensaje" es el objetivo que JS muestra.
      Empieza sin la clase .visible; JS la agrega al hacer clic.
    -->
    <div id="contenedor-mensaje" aria-live="polite">

      <!--
        EL MENSAJE DE TEXTO
        id="mensaje-texto" para que JS pueda actualizar el contenido.
        El texto real viene del JavaScript de abajo.
      -->
      <p class="mensaje-texto" id="mensaje-texto"></p>

      <!-- Separador interno -->
      <div class="separador" aria-hidden="true">🌻</div>

      <!-- Firma fija -->
      <p class="firma">Con cariño, tatancito </p>

    </div>

    <!-- Tulipanes decorativos al pie -->
    <div class="flores-pie" aria-hidden="true">🌷 🌻 🌷</div>

  </main>


  <script>
    /*
    ================================================================
    SECCIÓN 1: EL MENSAJE DEL DÍA
    ================================================================

    ⚠️  ATENCIÓN: AQUÍ DEBES CAMBIAR EL TEXTO CADA DÍA ⚠️
    ================================================================

    Solo modifica el texto entre las comillas de backtick (` `).
    Puedes usar:
      - Saltos de línea directos (Enter dentro del backtick)
      - \n para un salto de línea
      - Emojis 🌻

    Las comillas de backtick ` ` son "template literals" en JS:
    permiten escribir texto en varias líneas sin trucos especiales.

    ================================================================
    ↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓
    */

    const MENSAJE_DEL_DIA = `Que bello se siente ser querido por una mujer
    tan increible y perfecta como lo eres tu!.

Espero este dia sea igual de bonito que tu miamor. 🌻`;

    /*
    ↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑
    ================================================================
    FIN DE LA ZONA DE EDICIÓN DIARIA
    ================================================================
    */


    /*
    ================================================================
    SECCIÓN 2: MOSTRAR LA FECHA AUTOMÁTICA
    ================================================================

    Explicación paso a paso:

    1. `new Date()` crea un objeto con la fecha y hora ACTUAL
       del dispositivo del usuario.

    2. `Intl.DateTimeFormat` es una herramienta del navegador para
       formatear fechas según el idioma. Le pasamos:
       - "es-CO" → español de Colombia
       - { weekday, year, month, day } → qué partes mostrar
         "long" significa el nombre completo ("viernes", "junio")

    3. `.format(hoy)` convierte el objeto Date en un texto legible.
       Resultado: "viernes, 27 de junio de 2025"

    4. `.replace(/(^\w)/, c => c.toUpperCase())` hace que la primera
       letra sea mayúscula (Intl a veces la devuelve en minúscula).

    5. `document.getElementById("fecha")` busca el elemento HTML
       con id="fecha". `.textContent = ...` escribe el texto adentro.
    ================================================================
    */

    function mostrarFecha() {
      // Paso 1: Obtenemos la fecha actual del dispositivo
      const hoy = new Date();

      // Paso 2: Configuramos el formateador en español colombiano
      const formateador = new Intl.DateTimeFormat("es-CO", {
        weekday: "long",   // "viernes"
        day:     "numeric", // "27"
        month:   "long",   // "de junio"
        year:    "numeric" // "de 2025"
      });

      // Paso 3: Convertimos la fecha a texto legible
      let textoFecha = formateador.format(hoy);

      // Paso 4: Primera letra en mayúscula
      // (En algunos navegadores "viernes" puede venir en minúsculas)
      textoFecha = textoFecha.charAt(0).toUpperCase() + textoFecha.slice(1);

      // Paso 5: Escribimos el texto en el elemento HTML con id="fecha"
      document.getElementById("fecha").textContent = textoFecha;
    }


    /*
    ================================================================
    SECCIÓN 3: LÓGICA DEL BOTÓN — EVENTOS Y MANIPULACIÓN DEL DOM
    ================================================================

    Conceptos clave que vas a aprender aquí:

    🔹 getElementById(id)
       Busca un elemento en el HTML por su atributo id="..."
       Retorna una referencia al elemento (como un puntero).

    🔹 addEventListener(evento, función)
       Le "escucha" a un elemento esperando un evento específico.
       Cuando ocurre ese evento, ejecuta la función que le pasamos.
       El evento "click" se dispara cuando el usuario hace clic.

    🔹 classList.add(clase)
       Agrega una clase CSS al elemento. Útil para activar estilos
       definidos en CSS sin cambiar el CSS desde JS.

    🔹 classList.remove(clase)
       Quita una clase CSS del elemento.

    🔹 style.display
       Controla directamente la propiedad CSS "display" del elemento.
       "none" = oculto; "" (vacío) = vuelve al valor original del CSS.

    🔹 setAttribute(atributo, valor)
       Cambia un atributo HTML del elemento.
       Aquí lo usamos para actualizar aria-expanded (accesibilidad).
    ================================================================
    */

    function configurarBoton() {

      // Buscamos los elementos que vamos a manipular
      const boton      = document.getElementById("btn-abrir");
      const contenedor = document.getElementById("contenedor-mensaje");
      const parrafo    = document.getElementById("mensaje-texto");

      // Escribimos el mensaje del día en el párrafo (todavía invisible)
      parrafo.textContent = MENSAJE_DEL_DIA;

      /*
        addEventListener("click", función):
        Le decimos al botón: "cuando alguien haga clic en ti,
        ejecuta esta función".

        La función anónima (arrow function =>  ) se crea aquí mismo
        y solo existe para este propósito.
      */
      boton.addEventListener("click", function () {

        /*
          PASO A: Mostramos el contenedor del mensaje.
          Agregamos la clase "visible" que en el CSS cambia
          opacity de 0 → 1 y max-height de 0 → 500px.
          CSS hace la animación de transición automáticamente.
        */
        contenedor.classList.add("visible");

        /*
          PASO B: Ocultamos el botón después de un pequeño retraso.
          setTimeout(función, milisegundos) ejecuta la función
          después de esperar X milisegundos.

          300ms = 0.3 segundos. Esperamos un poco para que la
          animación de aparición del mensaje haya comenzado,
          haciendo que la transición sea más elegante.
        */
        setTimeout(function () {
          boton.style.display = "none";
        }, 300);

        /*
          PASO C: Actualizamos el atributo de accesibilidad.
          aria-expanded="true" le dice a lectores de pantalla
          que el contenido controlado por este botón ahora está visible.
        */
        boton.setAttribute("aria-expanded", "true");

      }); // fin del addEventListener

    } // fin de configurarBoton()


    /*
    ================================================================
    SECCIÓN 4: INICIALIZACIÓN — Punto de entrada del programa
    ================================================================

    `document.addEventListener("DOMContentLoaded", función)`:

    El navegador carga el HTML de arriba hacia abajo.
    Si el JS intentara buscar elementos con getElementById ANTES
    de que el HTML termine de cargarse, no los encontraría.

    DOMContentLoaded es un evento que se dispara exactamente cuando
    el HTML terminó de parsearse y los elementos ya existen en memoria.
    Es el momento seguro para empezar a trabajar con el DOM.
    ================================================================
    */
    document.addEventListener("DOMContentLoaded", function () {
      mostrarFecha();      // 1. Escribimos la fecha en pantalla
      configurarBoton();   // 2. Activamos la lógica del botón
    });

  </script>

</body>
</html>
